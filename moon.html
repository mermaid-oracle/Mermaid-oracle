<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月の手帳 — Mermaid Oracle</title>

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Shippori+Mincho:wght@300;400&display=swap" rel="stylesheet">

<!-- 共通スタイル -->
<link rel="stylesheet" href="assets/css/core.css">
<link rel="stylesheet" href="assets/css/components.css">

<style>
  body::before {
    background: linear-gradient(
      to bottom,
      #164b63 0%,
      #0b2236 45%,
      #061826 100%
    );
  }

  /* 暗背景用テキストカラー */
  .eyebrow, .moon-page-title, .moon-page-sub, .moon-date,
  .phase-name, .phase-en, .phase-age, .moon-message,
  .diary-label, .diary-prompt, .history-title, .history-sub,
  .history-empty, .hist-date, .hist-phase, .hist-label,
  .hist-block p, .oracle-chapter, .oracle-name { color: unset; }

  .moon-page-title  { color: #EAF0F4 !important; }
  .eyebrow          { color: #C8A86A !important; }
  .moon-page-sub    { color: #C8A86A !important; opacity:1 !important; }
  .moon-date        { color: #A8B8C4 !important; }
  .phase-name       { color: #EAF0F4 !important; }
  .phase-en         { color: #C8A86A !important; }
  .phase-age        { color: #7AABA8 !important; }
  .moon-message     { color: #EAF0F4 !important; font-family: 'Cormorant Garamond', serif !important; font-style: italic !important; font-size: 1.05rem !important; line-height: 2.2 !important; }
  .diary-label      { color: #C8A86A !important; }
  .diary-prompt     { color: #A8B8C4 !important; }
  .history-title    { color: #EAF0F4 !important; }
  .history-sub      { color: #B0A8C0 !important; }
  .history-empty    { color: #A8B8C4 !important; opacity:1 !important; }
  .hist-date        { color: #EAF0F4 !important; }
  .hist-phase       { color: #B0A8C0 !important; }
  .hist-label       { color: #C8A86A !important; }
  .hist-block p     { color: #D8E8F0 !important; }
  .page-nav a       { color: #7AABA8 !important; }
  .page-nav a:hover { color: #C8A86A !important; }
  .cycle-label      { color: #A8B8C4 !important; }
  .cycle-step.current .cycle-label { color: #C8A86A !important; }
  .moon-message-box { background: rgba(6,18,32,0.55) !important; border-color: rgba(184,152,90,0.2) !important; }
  .diary-section    { background: rgba(6,18,32,0.45) !important; border-color: rgba(184,152,90,0.18) !important; }
  .hist-entry       { background: rgba(6,18,32,0.5) !important; border-color: rgba(184,152,90,0.18) !important; }

  .moon-page {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 32px 20px 24px;
  }

  .moon-page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 0.28em;
    color: var(--ink);
    text-align: center;
    margin-bottom: 6px;
  }

  .moon-page-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    color: var(--lav);
    text-align: center;
    opacity: 0.9;
  }

  .moon-date {
    text-align: center;
    margin-top: 18px;
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    color: var(--ink2);
  }

  .moon-hero {
    text-align: center;
    padding: 28px 0 12px;
  }

  /* SVG月ビジュアル */
  .moon-hero {
    text-align: center;
    padding: 28px 0 16px;
  }

  .moon-canvas {
    position: relative;
    display: inline-block;
    width: 100px;
    height: 100px;
    margin: 0 auto;
  }

  .moon-outer-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,220,140,0.15) 0%, transparent 65%);
    animation: pulse 4s ease-in-out infinite;
    pointer-events: none;
  }

  .moon-svg {
    width: 100px;
    height: 100px;
    filter: drop-shadow(0 0 14px rgba(240,220,140,0.4));
    transition: filter 0.8s ease;
  }

  .moon-phase-full .moon-svg {
    filter: drop-shadow(0 0 24px rgba(255,240,160,0.85)) drop-shadow(0 0 48px rgba(240,220,120,0.4));
  }

  .moon-phase-new .moon-svg {
    filter: drop-shadow(0 0 10px rgba(80,120,180,0.3));
  }

  .moon-stars {
    position: absolute;
    inset: -45px;
    pointer-events: none;
  }

  .moon-star {
    position: absolute;
    background: rgba(255,250,220,0.9);
    border-radius: 50%;
    animation: starTwinkle 3s ease-in-out infinite;
  }

  .moon-star:nth-child(1) { width:2px;height:2px; top:8%;  left:10%;  animation-delay:0s;   }
  .moon-star:nth-child(2) { width:3px;height:3px; top:15%; left:88%;  animation-delay:0.6s; }
  .moon-star:nth-child(3) { width:2px;height:2px; top:78%; left:6%;   animation-delay:1.1s; }
  .moon-star:nth-child(4) { width:2px;height:2px; top:82%; left:90%;  animation-delay:1.7s; }
  .moon-star:nth-child(5) { width:3px;height:3px; top:3%;  left:52%;  animation-delay:0.9s; }
  .moon-star:nth-child(6) { width:2px;height:2px; top:92%; left:48%;  animation-delay:1.3s; }
  .moon-star:nth-child(7) { width:2px;height:2px; top:45%; left:2%;   animation-delay:0.4s; }
  .moon-star:nth-child(8) { width:3px;height:3px; top:38%; left:96%;  animation-delay:2.0s; }

  @keyframes starTwinkle {
    0%,100% { opacity:0.15; transform:scale(0.7); }
    50%      { opacity:1;   transform:scale(1.5);  }
  }

  .phase-name {
    margin-top: 18px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: #EAF0F4;
  }

  .phase-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    letter-spacing: 0.28em;
    color: #C8A86A;
    margin-top: 4px;
    opacity: 0.95;
  }

  .phase-age {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: #7AABA8;
    margin-top: 6px;
  }

  .cycle-bar {
    display: flex;
    justify-content: space-between;
    gap: 4px;
    margin: 24px auto 8px;
    padding: 14px 8px;
    border-radius: 14px;
    background: rgba(250,254,254,0.55);
    border: 1px solid rgba(154,144,168,0.22);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .cycle-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.42;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .cycle-step.current {
    opacity: 1;
    transform: translateY(-2px);
  }

  .cycle-step.current .cycle-symbol {
    text-shadow: 0 0 10px rgba(184,152,90,0.65);
  }

  .cycle-symbol {
    font-size: 1.05rem;
    line-height: 1;
  }

  .cycle-label {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.55rem;
    letter-spacing: 0.04em;
    color: var(--ink2);
    white-space: nowrap;
  }

  .cycle-step.current .cycle-label {
    color: var(--gold);
  }

  .moon-message-box {
    margin-top: 20px;
    padding: 22px 22px;
    text-align: center;
  }

  .moon-message {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.96rem;
    line-height: 2.1;
    color: var(--ink);
    letter-spacing: 0.04em;
  }

  .diary-section {
    margin-top: 28px;
  }

  .diary-block {
    margin-top: 18px;
  }

  .diary-block:first-child {
    margin-top: 0;
  }

  .diary-label {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .diary-prompt {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.84rem;
    line-height: 1.7;
    color: var(--ink2);
    margin-bottom: 10px;
  }

  .diary-actions {
    margin-top: 24px;
  }

  .history-section {
    margin-top: 36px;
  }

  .history-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    letter-spacing: 0.22em;
    color: var(--ink);
    text-align: center;
    margin-bottom: 4px;
  }

  .history-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: var(--lav);
    text-align: center;
    margin-bottom: 18px;
  }

  .history-empty {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink2);
    opacity: 0.7;
    padding: 24px 0;
    letter-spacing: 0.1em;
  }

  .hist-entry {
    margin-top: 14px;
    padding: 16px 18px;
    background: rgba(250,254,254,0.7);
    border: 1px solid rgba(154,144,168,0.22);
    border-radius: 14px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: cardReveal 0.5s ease-out both;
  }

  .hist-entry:first-child {
    margin-top: 0;
  }

  .hist-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 10px;
    margin-bottom: 10px;
    border-bottom: 1px dashed rgba(184,152,90,0.2);
  }

  .hist-symbol {
    font-size: 1.4rem;
    line-height: 1;
  }

  .hist-meta {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hist-date {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.85rem;
    color: var(--ink);
    letter-spacing: 0.08em;
  }

  .hist-phase {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    color: var(--lav);
  }

  .hist-del {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(154,144,168,0.3);
    background: transparent;
    color: var(--lav);
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .hist-del:hover {
    border-color: var(--ink2);
    color: var(--ink);
  }

  .hist-block {
    margin-top: 10px;
  }

  .hist-block:first-of-type {
    margin-top: 0;
  }

  .hist-label {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.62rem;
    letter-spacing: 0.24em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .hist-block p {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.88rem;
    line-height: 1.85;
    color: var(--ink);
    letter-spacing: 0.03em;
  }

  /* 暗背景テキストカラー */
  .moon-page-title  { color: #EAF0F4 !important; }
  .eyebrow          { color: #C8A86A !important; }
  .moon-page-sub    { color: #C8A86A !important; opacity:1 !important; }
  .moon-date        { color: #A8B8C4 !important; }
  .moon-message     { color: #EAF0F4 !important; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size:1.05rem; line-height:2.2; }
  .diary-label      { color: #C8A86A !important; }
  .diary-prompt     { color: #A8B8C4 !important; }
  .history-title    { color: #EAF0F4 !important; }
  .history-sub      { color: #B0A8C0 !important; }
  .history-empty    { color: #A8B8C4 !important; opacity:1 !important; }
  .hist-date        { color: #EAF0F4 !important; }
  .hist-phase       { color: #B0A8C0 !important; }
  .hist-label       { color: #C8A86A !important; }
  .hist-block p     { color: #D8E8F0 !important; }
  .cycle-label      { color: #A8B8C4 !important; }
  .cycle-step.current .cycle-label { color: #C8A86A !important; }
  .page-nav a       { color: #7AABA8 !important; }
  .page-nav a:hover { color: #C8A86A !important; }
  .moon-message-box { background: rgba(6,18,32,0.55) !important; border: 1px solid rgba(184,152,90,0.2) !important; }
  .diary-section    { background: rgba(6,18,32,0.45) !important; border: 1px solid rgba(184,152,90,0.18) !important; }
  .hist-entry       { background: rgba(6,18,32,0.5) !important; border: 1px solid rgba(184,152,90,0.18) !important; }
  .cycle-bar        { background: rgba(6,18,32,0.45) !important; border-color: rgba(184,152,90,0.18) !important; }
  #saveFlash        { margin-top: 14px; }


  .site-footer {
    text-align: center;
    padding: 20px var(--pad-x) 28px;
    margin-top: 8px;
  }
  .site-footer p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    color: rgba(200,168,100,0.5);
  }
</style>

</head>
<body>

<main class="moon-page">

<header>
  <p class="eyebrow">Moon Diary</p>
  <h1 class="moon-page-title">月の手帳</h1>
  <p class="moon-page-sub">— A quiet night with the moon —</p>
  <p class="moon-date" id="todayDate">—</p>
</header>

<section class="moon-hero fade-in" id="moonHeroSection">
  <div class="moon-canvas" id="moonCanvas">
    <div class="moon-stars">
      <span class="moon-star"></span><span class="moon-star"></span>
      <span class="moon-star"></span><span class="moon-star"></span>
      <span class="moon-star"></span><span class="moon-star"></span>
      <span class="moon-star"></span><span class="moon-star"></span>
    </div>
    <div class="moon-outer-glow"></div>
    <svg class="moon-svg" id="moonSvg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="moonLight" cx="42%" cy="38%" r="58%">
          <stop offset="0%"   stop-color="#FFFBE8"/>
          <stop offset="35%"  stop-color="#F0E8C0"/>
          <stop offset="70%"  stop-color="#D4C080"/>
          <stop offset="100%" stop-color="#A89040"/>
        </radialGradient>
        <radialGradient id="moonNew" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#1a2a3a"/>
          <stop offset="100%" stop-color="#0d1e2a"/>
        </radialGradient>
        <radialGradient id="crater1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(160,130,60,0.3)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <clipPath id="moonClip">
          <circle cx="70" cy="70" r="62"/>
        </clipPath>
      </defs>
      <circle cx="70" cy="70" r="63" fill="none" stroke="rgba(200,168,100,0.2)" stroke-width="0.5"/>
      <circle id="moonBase" cx="70" cy="70" r="62" fill="url(#moonLight)"/>
      <g clip-path="url(#moonClip)" opacity="0.45">
        <ellipse cx="50" cy="55" rx="16" ry="14" fill="url(#crater1)"/>
        <ellipse cx="88" cy="38" rx="10" ry="9"  fill="url(#crater1)"/>
        <ellipse cx="70" cy="88" rx="14" ry="12" fill="url(#crater1)"/>
      </g>
      <g id="moonShadowGroup" clip-path="url(#moonClip)"></g>
    </svg>
  </div>
  <h2 class="phase-name" id="phaseName">—</h2>
  <p class="phase-en"  id="phaseEn">—</p>
  <p class="phase-age" id="phaseAge">—</p>
</section>

<div class="cycle-bar" id="cycleBar"></div>

<section class="moon-message-box glass-card soft">
  <p class="moon-message" id="moonMessage">—</p>
</section>

<section class="diary-section glass-card soft">
  <div class="diary-block">
    <span class="diary-label">今日の意図</span>
    <p class="diary-prompt" id="intentionPrompt">—</p>
    <textarea
      class="diary-input"
      id="intentionInput"
      placeholder="月に願いを預けるように、静かに書いてください…"
      rows="4"></textarea>
  </div>

  <div class="diary-block">
    <span class="diary-label">手放すこと</span>
    <p class="diary-prompt" id="releasePrompt">—</p>
    <textarea
      class="diary-input"
      id="releaseInput"
      placeholder="海に還したい想いを、そっと書いてみて…"
      rows="4"></textarea>
  </div>

  <div class="diary-actions">
    <button class="btn-save" id="saveBtn" type="button">
      🐚 &ensp; 今日の記録を、海に預ける
    </button>
    <p class="flash" id="saveFlash"></p>
  </div>
</section>

<section class="history-section">
  <h2 class="history-title">これまでの月夜</h2>
  <p class="history-sub">— Past Whispers —</p>

  <p class="history-empty" id="historyEmpty">
    まだ、海はあなたの言葉を待っています。
  </p>

  <div id="historyList"></div>
</section>

</main>

<nav class="page-nav">
  <a href="oracle.html" class="back" data-transition>カードへ戻る</a>
  <a href="index.html" class="next" data-transition>入口へ</a>
</nav>

<script src="assets/js/core.js"></script>
<script src="assets/js/moon-data.js"></script>
<script src="assets/js/moon.js"></script>


<footer class="site-footer">
  <p>© 2026 Lemurian Mermaid. All rights reserved.</p>
</footer>
</body>
</html>
